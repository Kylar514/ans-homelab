---
# Deploy secret files to the Ansible control node (Azir).
# Run manually from your local machine — never called by site.yml.
# Usage: ansible-playbook playbooks/deploy_ansible_secrets.yml --private-key ~/.ssh/homelab
- name: Deploy ansible secrets
  hosts: ansible_control
  become: true
  roles:
    - set_secrets
