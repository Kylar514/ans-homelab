---
# Configures keepalived VIP failover between Traefik hosts.
# Requires vip_auth_pass to be available via Ansible Vault.
# Run with: ansible-playbook playbooks/vip_failover.yml --ask-vault-pass
- name: VIP failover setup
  hosts: vip_failover
  become: true
  roles:
    - vip_failover
