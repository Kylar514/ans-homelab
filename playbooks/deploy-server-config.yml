---
# Deploy dotfiles from server-config repo to all managed hosts.
# Triggered automatically by CI/CD polling loop when server-config repo changes.
#
# Usage: ansible-playbook playbooks/deploy-server-config.yml

- name: Deploy server config dotfiles
  hosts: all
  become: true
  roles:
    - set_server_config
