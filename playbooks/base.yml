---
# Base system configuration applied to all managed hosts.
# Covers: SSH key management, system packages, unattended upgrades, git credentials, and repo cloning.

- name: Base system setup
  hosts: all
  become: true
  roles:
    - timezone
    - ssh_access
    - sys_packages
    - unattended_upgrades
    - git_config
    - clone_repos
    - server_config
