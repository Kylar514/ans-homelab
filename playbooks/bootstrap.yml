# SPDX-License-Identifier: MIT-0
---
# Please set proper user and ssh key in ansible.cfg, than change back after running bootstrap
- name: Bootstrap Azir — SSH key and Actions runner
  hosts: all
  vars:
  roles:
    - timezone
    - users
    - ssh_access
    - sys_packages
    - ansible_key
    - ansible_repo
    - gh_runner
    - copy_files
    - ufw
    - nfs_client
    - unattended_upgrades
