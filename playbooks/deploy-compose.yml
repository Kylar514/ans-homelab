---
# Deploy docker compose services on docker_hosts.
# Called by docker-services CI workflow when compose files change.
# Always pass --limit to target only the affected host or group.
#
# Usage:
#   ansible-playbook playbooks/deploy-compose.yml \
#     --extra-vars 'docker_compose_services=["core/traefik"]' \
#     --limit traefik_hosts
#
#   ansible-playbook playbooks/deploy-compose.yml \
#     --extra-vars 'docker_compose_services=["services/kennen/vaultwarden"]' \
#     --limit kennen
#
#   ansible-playbook playbooks/deploy-compose.yml \
#     --extra-vars 'docker_compose_action=pull docker_compose_services=["core/traefik"]' \
#     --limit traefik_hosts

- name: Deploy Docker Compose Services
  hosts: docker_hosts
  become: true
  roles:
    - docker_compose
