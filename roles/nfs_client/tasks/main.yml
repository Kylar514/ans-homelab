---
# tasks file for nfs_client
# Mounts NFS shares from nasus onto docker_hosts.
# Mount points are created by the docker role — this role just mounts them.
# nfs-common is installed via sys_packages base_packages fleet-wide.

- name: Ensure NFS mount directories exist
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: '{{ nfs_mounts }}'
  when: nfs_mounts is defined
  become: true

- name: Mount NFS shares
  ansible.builtin.mount:
    src: '{{ item.src }}'
    path: '{{ item.path }}'
    fstype: nfs
    opts: '{{ item.opts }}'
    state: mounted
  loop: '{{ nfs_mounts }}'
  when: nfs_mounts is defined
  become: true
