---
# tasks file for set_keychain

- name: Deploy askpass helper script
  ansible.builtin.template:
    src: askpass.sh.j2
    dest: '{{ keychain_askpass_script }}'
    owner: '{{ ansible_user }}'
    group: '{{ ansible_user }}'
    mode: '0700'
  no_log: true

- name: Ensure systemd user directory exists
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/.config/systemd/user
    state: directory
    owner: '{{ ansible_user }}'
    group: '{{ ansible_user }}'
    mode: '0755'

- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become_user: '{{ ansible_user }}'

- name: Deploy ansible-keychain systemd user service
  ansible.builtin.template:
    src: ansible-keychain.service.j2
    dest: /home/{{ ansible_user }}/.config/systemd/user/ansible-keychain.service
    owner: '{{ ansible_user }}'
    group: '{{ ansible_user }}'
    mode: '0644'
  notify: Enable and start ansible-keychain

- name: Enable linger for keychain user
  ansible.builtin.command:
    cmd: loginctl enable-linger {{ ansible_user }}
  changed_when: false
