---
# tasks file for clone_repos
# Clones or updates repos defined in the 'repos' variable.
# Each host group defines its own complete repos list in group_vars.

- name: Clone or update repository
  ansible.builtin.git:
    repo: '{{ item.url }}'
    dest: '{{ item.dest }}'
    version: "{{ item.branch | default('master') }}"
    update: true
    force: false
  become_user: '{{ ansible_user }}'
  loop: '{{ repos }}'
  loop_control:
    label: '{{ item.name }}'
  when: repos | length > 0

- name: Set repository directory permissions
  command: >
    find {{ item.dest }} -type d
    -exec chown {{ item.permissions.owner }}:{{ item.permissions.group }} {} +
    -exec chmod {{ item.permissions.dir_mode }} {} +
  loop: '{{ repos }}'
  loop_control:
    label: '{{ item.name }}'
  when:
    - repos | length > 0
    - item.permissions is defined
  changed_when: false

- name: Set repository file permissions
  command: >
    find {{ item.dest }} -type f
    -exec chown {{ item.permissions.owner }}:{{ item.permissions.group }} {} +
    -exec chmod {{ item.permissions.file_mode }} {} +
  loop: '{{ repos }}'
  loop_control:
    label: '{{ item.name }}'
  when:
    - repos | length > 0
    - item.permissions is defined
  changed_when: false
