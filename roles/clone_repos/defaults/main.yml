---
# defaults file for clone_repos
# repos is defined per host group in group_vars — each group defines its complete list.
# Example entry:
#   repos:
#     - name: my-repo
#       url: https://github.com/kylar514/my-repo.git
#       dest: /home/{{ ansible_user }}/my-repo
#       branch: master

repos: []
