---
# tasks file for docker_prune
# Prunes unused Docker resources. All flags default to false — explicit opt-in only.
# Usage: ansible-playbook playbooks/docker-prune.yml \
#          --extra-vars 'docker_prune_images=true docker_prune_networks=true' \
#          --limit kennen
# WARNING: Never pass docker_prune_volumes=true in CI. Only run manually with
#          all services confirmed running — stopped services have detached volumes
#          that Docker considers unused.

- name: Prune unused images
  command: docker image prune -f
  changed_when: false
  when: docker_prune_images | bool

- name: Prune stopped containers
  command: docker container prune -f
  changed_when: false
  when: docker_prune_containers | bool

- name: Prune unused networks
  command: docker network prune -f
  changed_when: false
  when: docker_prune_networks | bool

- name: Prune volumes (DESTRUCTIVE - explicit opt-in only, never run in CI)
  command: docker volume prune -f
  changed_when: false
  when: docker_prune_volumes | bool
