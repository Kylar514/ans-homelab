---
# defaults file for server_config

server_config_repo_dir: '/home/{{ ansible_user }}/server-config'
server_config_user_home: '/home/{{ ansible_user }}'

# Dotfiles to symlink from the server-config repo into the user's home directory.
# Existing files are replaced by symlinks (force: true).
server_config_dotfiles:
  - .bashrc
  - .vimrc
