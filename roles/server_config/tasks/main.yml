---
# tasks file for server_config
# Symlinks dotfiles from the server-config repo into the ansible_user home directory.
# Must run after clone_repos so the repo is already on disk.
# Existing files are replaced by symlinks — the repo is the source of truth.

- name: Verify server-config repo has been cloned
  ansible.builtin.stat:
    path: '{{ server_config_repo_dir }}'
  register: server_config_repo
  failed_when: not server_config_repo.stat.exists
  changed_when: false

- name: 'Symlink dotfile: {{ item }}'
  ansible.builtin.file:
    src: '{{ server_config_repo_dir }}/{{ item }}'
    dest: '{{ server_config_user_home }}/{{ item }}'
    state: link
    force: true
    owner: '{{ ansible_user }}'
    group: '{{ ansible_user }}'
  loop: '{{ server_config_dotfiles }}'
