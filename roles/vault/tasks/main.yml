---
# Installs and configures HashiCorp Vault on the ansible_control node (azir-01).
# Uses Raft integrated storage. Vault must be manually initialized and unsealed
# after first install — this is intentional and cannot be automated.
# AppRole auth is configured so GitHub Actions can authenticate at runtime.

- name: Add HashiCorp GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://apt.releases.hashicorp.com/gpg |
      gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg
  become: true

- name: Add HashiCorp apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg]
      https://apt.releases.hashicorp.com {{ ansible_facts['distribution_release'] }} main
    state: present
    filename: hashicorp
  become: true

- name: Install Vault
  ansible.builtin.package:
    name: vault
    state: present
    update_cache: true
  become: true

- name: Ensure Vault data directory exists
  ansible.builtin.file:
    path: /opt/vault/data
    state: directory
    owner: vault
    group: vault
    mode: '0750'
  become: true

- name: Deploy Vault configuration
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: /etc/vault.d/vault.hcl
    owner: vault
    group: vault
    mode: '0640'
  become: true
  notify: Restart vault

- name: Ensure Vault service is started and enabled
  ansible.builtin.systemd:
    name: vault
    state: started
    enabled: true
    daemon_reload: true
  become: true
