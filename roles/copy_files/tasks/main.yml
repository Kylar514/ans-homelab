---
- name: Merge all_files and group_files
  ansible.builtin.set_fact:
    files_to_copy_final: "{{ (all_files | default([])) + (group_files | default([])) | unique(attribute='dest') }}"

- name: Copy files to server
  ansible.builtin.copy:
    src: '{{ inventory_dir }}/files/{{ item.src }}'
    dest: '{{ item.dest }}'
    owner: '{{ item.owner }}'
    group: '{{ item.group }}'
    mode: "{{ item.mode | default('0644') }}"
  loop: '{{ files_to_copy_final }}'
  become: true
