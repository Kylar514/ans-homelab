---
# tasks file for docker_env
# Writes .env files from vault variables to /srv/docker/env/<service>.env on target hosts.
# Run via deploy-env.yml when secrets change or a new service is onboarded.
# Templates live in roles/docker_env/templates/ — one .env.j2 per service.
# /srv/docker/env/ is created by the docker role — no need to create it here.

- name: Write service .env file from vault
  ansible.builtin.template:
    src: '{{ item.template }}'
    dest: '{{ docker_env_base_dir }}/{{ item.path }}.env'
    owner: zeal
    group: zeal
    mode: '0600'
  loop: '{{ docker_env_services }}'
  loop_control:
    label: '{{ item.path }}'
  when: docker_env_services | length > 0
  no_log: true
