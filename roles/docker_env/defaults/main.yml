---
# defaults file for docker_env

# List of services to write .env files for.
# Defined per host in host_vars/<hostname>/vars.yml — each host only gets
# the secrets for the services it runs.
#
# Each entry requires:
#   path:     flat service name — file is written to /srv/docker/env/<path>.env
#             e.g. 'vaultwarden' -> /srv/docker/env/vaultwarden.env
#                  'traefik'     -> /srv/docker/env/traefik.env
#   template: template filename from roles/docker_env/templates/
#             e.g. 'vaultwarden.env.j2'
#
# Example (in host_vars/kennen/vars.yml):
#   docker_env_services:
#     - path: vaultwarden
#       template: vaultwarden.env.j2
#
# Example (in host_vars/ryze/vars.yml):
#   docker_env_services:
#     - path: traefik
#       template: traefik.env.j2
docker_env_services: []

# Base directory where .env files are written on target hosts.
# Created by the docker role — do not create it here.
docker_env_base_dir: /srv/docker/env
