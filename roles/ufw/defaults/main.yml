---
# defaults file for ufw

# Additional UFW rules to apply
# Populate this in group_vars or host_vars per service as needed.
# Each entry supports: port (required), proto (default: tcp), rule (default: allow), groups: ['example']

ufw_rules:
  - { port: '80', proto: tcp, rule: allow, groups: ['traefik_hosts'] }
  - { port: '443', proto: tcp, rule: allow, groups: ['traefik_hosts'] }
