---
# tasks file for actions_runner
# Installs, registers, and manages GitHub Actions self-hosted runners
# as systemd user services under the ansible_user account.
#
# Runs only on hosts in the ansible_control group (Azir).
#
# Prerequisites — run the git_config role first so these exist:
#   ~/.github_runner_pat   — written from vault_github_runner_pat
#   ~/.git-credentials     — written from vault_github_pat
#
# The runner service runs in user scope alongside ansible-keychain.service
# so it inherits SSH_AUTH_SOCK and can use the passphrase-protected ansible
# SSH key without any prompts.
#
# The runner self-updates automatically when jobs are assigned or within a week
# of a new release — no version pinning needed here.
#
# Key rotation: re-run bootstrap.yml with -e actions_runner_force_reregister=true

- name: Ensure systemd user directory exists
  ansible.builtin.file:
    path: '/home/{{ ansible_user }}/.config/systemd/user'
    state: directory
    owner: '{{ ansible_user }}'
    group: '{{ ansible_user }}'
    mode: '0755'
  when: "'ansible_control' in group_names"

- name: Check if any runner needs installing
  ansible.builtin.find:
    paths: '{{ actions_runner_base_dir }}'
    patterns: '*/run.sh'
    file_type: any
  register: existing_runners
  when: "'ansible_control' in group_names"

- name: Get latest runner release version from GitHub API
  ansible.builtin.uri:
    url: "https://api.github.com/repos/actions/runner/releases/latest"
    method: GET
    headers:
      Accept: "application/vnd.github+json"
      X-GitHub-Api-Version: "2022-11-28"
    return_content: true
  register: runner_latest_release
  when:
    - "'ansible_control' in group_names"
    - existing_runners.matched == 0

- name: Set runner version fact
  ansible.builtin.set_fact:
    actions_runner_version: "{{ runner_latest_release.json.tag_name | regex_replace('^v', '') }}"
  when:
    - "'ansible_control' in group_names"
    - existing_runners.matched == 0

- name: Download runner archive
  ansible.builtin.get_url:
    url: "https://github.com/actions/runner/releases/download/v{{ actions_runner_version }}/actions-runner-linux-x64-{{ actions_runner_version }}.tar.gz"
    dest: "/tmp/actions-runner.tar.gz"
    mode: '0644'
  when:
    - "'ansible_control' in group_names"
    - existing_runners.matched == 0

- name: Ensure runner install directories exist and extract
  ansible.builtin.include_tasks: install_runner.yml
  loop: '{{ actions_runner_repos }}'
  loop_control:
    loop_var: runner_repo
  when: "'ansible_control' in group_names"

- name: Remove runner archive
  ansible.builtin.file:
    path: '/tmp/actions-runner.tar.gz'
    state: absent
  when: "'ansible_control' in group_names"

- name: Register and configure runners
  ansible.builtin.include_tasks: configure_runner.yml
  loop: '{{ actions_runner_repos }}'
  loop_control:
    loop_var: runner_repo
  when: "'ansible_control' in group_names"

- name: Deploy runner systemd service units
  ansible.builtin.include_tasks: deploy_service.yml
  loop: '{{ actions_runner_repos }}'
  loop_control:
    loop_var: runner_repo
  when: "'ansible_control' in group_names"

- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become_user: '{{ ansible_user }}'
  when: "'ansible_control' in group_names"

- name: Enable and start runner services
  ansible.builtin.include_tasks: start_service.yml
  loop: '{{ actions_runner_repos }}'
  loop_control:
    loop_var: runner_repo
  when: "'ansible_control' in group_names"
