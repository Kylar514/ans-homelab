---
# defaults file for actions_runner
# Configured for repo-level runners (personal account, not org).

actions_runner_base_dir: '/home/{{ ansible_user }}/actions-runner'
actions_runner_pat_file: '/home/{{ ansible_user }}/.github_runner_pat'

# Repos to register runners for. Each repo gets its own runner installation,
# registration, and systemd service on Azir.
actions_runner_repos:
  - name: ans-homelab
    url: 'https://github.com/Kylar514/ans-homelab'
  - name: docker-services
    url: 'https://github.com/Kylar514/docker-services'
  - name: server-config
    url: 'https://github.com/Kylar514/server-config'

actions_runner_labels: 'self-hosted,Linux,X64'
actions_runner_group: 'Default'

# Set to true to force re-registration for ALL repos (e.g. after rotating vault_github_runner_pat).
# Usage: ansible-playbook playbooks/bootstrap.yml -e actions_runner_force_reregister=true
actions_runner_force_reregister: false
