---
# vars for docker_hosts group in staging env

# Repos cloned on staging docker hosts.
repos:
  - name: server-config
    url: 'https://github.com/Kylar514/server-config.git'
    dest: '/home/{{ ansible_user }}/server-config'
    branch: master
  - name: docker-services
    url: 'https://github.com/Kylar514/docker-services.git'
    dest: '/srv/docker/docker-services'
    branch: test
    permissions:
      owner: zeal
      group: dockersvc
      dir_mode: '2770'
      file_mode: '0660'
