# host_vars for heimerdinger — staging host
# Mirrors production service secrets for testing.
# Keep in sync with production host_vars as services are onboarded.

docker_env_services:
  - path: traefik
    template: traefik.env.j2
  - path: vaultwarden
    template: vaultwarden.env.j2
  - path: nextcloud
    template: nextcloud.env.j2
  - path: torrent
    template: torrent.env.j2
  - path: homarrr
    template: homarrr.env.j2
