---
# group_vars for ansible_control — files copied from the Ansible controller to Azir.
# These are physical files that must exist on your local machine before running bootstrap.yml.
# All other secrets (PATs, git-credentials) are templated from vault variables by the git_config role.

secret_files:
  - src: ~/.ssh/ansible
    dest: '/home/{{ ansible_user }}/.ssh/ansible'
    owner: '{{ ansible_user }}'
    mode: '0600'
  - src: ~/.ansible_vault_pass
    dest: '/home/{{ ansible_user }}/.ansible_vault_pass'
    owner: '{{ ansible_user }}'
    mode: '0600'
