---
# vars for docker_hosts group

# Repos cloned on docker hosts — extends the fleet-wide repos in group_vars/all/vars.yml
# Note: Ansible uses 'replace' hash behaviour by default, so this overrides the all/vars.yml
# repos list. Include server-config here too so docker_hosts get both repos.
repos:
  - name: server-config
    url: 'https://github.com/Kylar514/server-config.git'
    dest: '/home/{{ ansible_user }}/server-config'
    branch: master
  - name: docker-services
    url: 'https://github.com/Kylar514/docker-services.git'
    dest: '/home/{{ ansible_user }}/docker-services'
    branch: master
