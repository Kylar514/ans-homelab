# SPDX-License-Identifier: MIT-0
---
name: Ansible Test

on:
  push:
    branches: [test]
  pull_request:
    branches: [master]

jobs:
  test-site:
    name: Dry run site.yml
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Check for infrastructure changes
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: |
            playbooks/**
            roles/**
            inventories/**/inventory.yml

      - name: Syntax check
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          source ~/.keychain/Azir-sh
          ansible-playbook playbooks/site.yml --syntax-check --vault-password-file ~/.ansible_vault_pass
        working-directory: /home/zeal/ans-homelab

      - name: Dry run against prod
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          source ~/.keychain/Azir-sh
          ansible-playbook playbooks/site.yml --check --diff --vault-password-file ~/.ansible_vault_pass
        working-directory: /home/zeal/ans-homelab

      - name: Dry run against staging
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          source ~/.keychain/Azir-sh
          ansible-playbook playbooks/site.yml -i inventories/staging --check --diff --vault-password-file ~/.ansible_vault_pass
        working-directory: /home/zeal/ans-homelab

  test-env:
    name: Dry run deploy-env.yml
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Check for secret-related changes
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: |
            inventories/**/vault.yml
            inventories/**/host_vars/**
            roles/docker_env/templates/**

      - name: Dry run deploy-env against staging
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          source ~/.keychain/Azir-sh
          ansible-playbook playbooks/deploy-env.yml -i inventories/staging --check --diff --vault-password-file ~/.ansible_vault_pass
        working-directory: /home/zeal/ans-homelab
