# SPDX-License-Identifier: MIT-0
---
name: Ansible Test

on:
  push:
    branches: [test]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Source SSH agent environment
        run: |
          source ~/.keychain/Azir-sh
          ansible-playbook playbooks/site.yml --syntax-check
      - name: Dry run against prod
        run: |
          source ~/.keychain/Azir-sh
          ansible-playbook playbooks/site.yml \
            --check --diff \
            --vault-password-file ~/.ansible_vault_pass
      - name: Dry run against staging
        run: |
          source ~/.keychain/Azir-sh
          ansible-playbook playbooks/site.yml -i inventories/staging \
            --check --diff \
            --vault-password-file ~/.ansible_vault_pass
